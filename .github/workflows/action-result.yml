name: Check The Result Of Lotto (로또 결과봇)

on:
  schedule:
    - cron: "20 13 * * 6" # UTC 13:20 = KST 22:20 (토요일 밤, 추첨 후)
  workflow_dispatch:

jobs:
  check-result:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run Lotto Result Check Script
        shell: bash
        run: |
          python ./check_result.py \
            --user-id "${{ secrets.USER_ID }}" \
            --user-pw "${{ secrets.USER_PW }}" \
            --slack-token "${{ secrets.SLACK_BOT_TOKEN }}" \
            --slack-channel "${{ secrets.SLACK_CHANNEL }}" \
            --proxy-user "${{ secrets.PROXY_USER }}" \
            --proxy-pw "${{ secrets.PROXY_PW }}" \
            --proxy-address "${{ secrets.PROXY_ADDRESS }}" \
            --headless \
            --timeout-ms 90000
